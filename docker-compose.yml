services:
  hartzadb:
    image: postgres:16-alpine
    container_name: hartzadb
    restart: always
    environment:
      POSTGRES_USER: hartza
      POSTGRES_PASSWORD: hartza
      POSTGRES_DB: hartza
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hartza -d hartza"]
      interval: 5s
      timeout: 5s
      retries: 20

  hartza-web:
    build:
      context: .
      target: dev
    container_name: hartza-web
    working_dir: /app
    env_file: [.env]
    environment:
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    ports: ["5127:3000"]
    restart: always
    volumes:
      - ./:/app
      - node-modules:/app/node_modules
      - next-cache:/app/.next
      - npm-cache:/root/.npm
    depends_on:
      hartzadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  node-modules:
  next-cache:
  npm-cache:
